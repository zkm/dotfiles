# ============================
# Modern Tmux Config
# ============================

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# ============================
# General Settings
# ============================

# Faster escape time for vim
set -sg escape-time 50

# Enable mouse support
set -g mouse on

# Increase scrollback
set -g history-limit 50000

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't rename windows automatically
set -g allow-rename off

# Better colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ============================
# Keybindings
# ============================

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching with vim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Resize panes with Alt+arrows
bind -n M-Left resize-pane -L 2
bind -n M-Right resize-pane -R 2
bind -n M-Up resize-pane -U 2
bind -n M-Down resize-pane -D 2

# Shift+arrows for window navigation
bind -n S-Left previous-window
bind -n S-Right next-window

# Split panes in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-like copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Don't suspend with Ctrl+z
unbind-key C-z

# ============================
# Catppuccin Theme
# ============================

# Theme colors (frappe variant)
thm_bg="#303446"
thm_fg="#c6d0f5"
thm_cyan="#8dcbf6"
thm_black="#151621"
thm_magenta="#ca9ee6"
thm_blue="#8caaee"
thm_white="#b5bfe4"
thm_gray="#737994"
thm_red="#e78284"
thm_yellow="#f9e2af"
thm_green="#a6d189"
thm_orange="#ef9f76"

# Status bar
set -g status on
set -g status-bg "${thm_bg}"
set -g status-fg "${thm_fg}"

# Status left (session name)
set -g status-left "#[fg=${thm_magenta},bold] #S "
set -g status-left-length 50

# Status right (time, date, etc.)
set -g status-right ""
set -g status-right-length 100

# Window status
setw -g window-status-format "#[fg=${thm_gray}]#[bg=${thm_bg}] #I:#W "
setw -g window-status-current-format "#[fg=${thm_bg}]#[bg=${thm_blue}] #I:#W "
setw -g window-status-activity-style "bold"
setw -g window-status-bell-style "fg=${thm_red}"

# Pane border colors
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Message colors
set -g message-style "fg=${thm_bg},bg=${thm_blue},bold"
set -g message-command-style "fg=${thm_bg},bg=${thm_cyan},bold"

# ============================
# Continuum & Resurrect
# ============================

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
