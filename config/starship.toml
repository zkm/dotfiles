add_newline = true
scan_timeout = 30
command_timeout = 5000
format = """
[в•ӯв”Җ](bold #565f89) $os$username$hostname$directory$git_branch${custom.git_host}$git_status$fill$cmd_duration
[в•°в”Җ](bold #565f89) $character"""
right_format = "$jobs$python$nodejs$rust$golang$java$package$helm$kubernetes$terraform$aws$gcloud$time$battery${custom.banger}${env_var.CHAMELEON}"

[fill]
symbol = " "

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bold #7aa2f7"

[os.symbols]
AlmaLinux = "пҢқ"
Arch = "пҢғ"
Debian = "пҢҶ"
Fedora = "пҢҠ"
Gentoo = "пҢҚ"
Linux = "пҢҡ"
Macos = "пҢӮ"
NixOS = "пҢ“"
openSUSE = "пҢ”"
Ubuntu = "пҢӣ"
Unknown = "п„Ё"
Windows = "у°ҚІ"

[character]
success_symbol = "[вқҜ](bold #9ece6a)"
error_symbol = "[вқҜ](bold #f7768e)"
vimcmd_symbol = "[вқ®](bold #9ece6a)"
vimcmd_replace_one_symbol = "[вқ®](bold #e0af68)"
vimcmd_replace_symbol = "[вқ®](bold #e0af68)"
vimcmd_visual_symbol = "[вқ®](bold #bb9af7)"

[cmd_duration]
min_time = 2000
format = "уұҺ« [$duration](bold #7dcfff) "
disabled = false

[directory]
home_symbol = "~"
truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "bold #7aa2f7"
read_only = " у°Ңҫ"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = "пҗҳ "
style = "bold #e0af68"
truncation_symbol = ""

[git_metrics]
disabled = true
format = "([+$added](green) /([~$deleted](red)))"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "#f7768e"
conflicted = "у°һҮ "
ahead = "вҮЎ"
behind = "вҮЈ"
diverged = "вҮ•"
up_to_date = ""
untracked = "у°һӢ "
stashed = "у°Ҹ— "
modified = "у°·« "
staged = "у°„¬ "
renamed = "у°‘• "
deleted = "у°Ҷҙ "

[custom.git_host]
command = "url=\"$(git remote get-url origin 2>/dev/null || true)\"; case \"$url\" in *github* ) echo \"пҗҲ\" ;; *gitlab* ) echo \"пҠ–\" ;; *gitea*|*forgejo*|*localhost*|*127.0.0.1*|*.local*|*.lan* ) echo \"у°ҹ“\" ;; * ) echo \"\" ;; esac"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
require_repo = true
format = "[$output ]($style)"
style = "bold #e0af68"

[golang]
format = "via [$symbol($version )]($style)"
symbol = "оҳ§ "
style = "#7dcfff"

[helm]
format = "via [$symbol$version ]($style)"
symbol = "вҺҲ "
style = "#7aa2f7"

[hostname]
ssh_only = false
format = "[$ssh_symbol](dimmed #7aa2f7)[$hostname](dimmed #7aa2f7) "
style = "dimmed #7aa2f7"
ssh_symbol = "у°ЈҖ "
trim_at = ".local"

[java]
format = "via [$symbol($version )]($style)"
symbol = "оү– "
style = "bold #bb9af7"

[jobs]
format = "[$symbol$count]($style)"
symbol = "пҖ“ "
style = "#9ece6a"
number_threshold = 1

[kubernetes]
format = "on [$symbol$context]($style) "
symbol = "вҳё "
style = "#7aa2f7"
disabled = false

[line_break]
disabled = false

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = "оңҳ "
style = "#9ece6a"
detect_files = ["package.json", ".node-version"]

[package]
format = "via [$symbol$version]($style)"
symbol = "у°Ҹ— "
style = "#d4a0e0"

[python]
format = "via [$symbol($version )]($style)"
symbol = "оңј "
style = "#9ece6a"
python_binary = ["python", "python3", "py"]
detect_files = ["pyproject.toml", "Pipfile", ".python-version", "requirements.txt", "setup.py", "__init__.py"]

[rust]
format = "via [$symbol($version )]($style)"
symbol = "оһЁ "
style = "#e0af68"

[shell]
bash_indicator = ""
ion_indicator = ""
nu_indicator = ""
powershell_indicator = ""
zsh_indicator = ""

[shlvl]
symbol = "у°ң® "
disabled = false
format = "$symbol$shlvl"

[terraform]
format = "via [$symbol$workspace]($style)"
symbol = "уұҒў "
style = "#7aa2f7"

[username]
show_always = false
format = "[$user]($style) "
style_root = "bold #f7768e"
style_user = "bold #7aa2f7"

[aws]
format = 'on [$symbol($profile )(\[$region\] )]($style)'
style = "#f7768e"
symbol = "у°ёҸ "

[gcloud]
format = "on [$symbol$account]($style) "
style = "#7dcfff"
symbol = "уұҮ¶ "

[time]
disabled = false
format = "at [у°Ҙ” $time]($style) "
time_format = "%H:%M"
style = "bold #bb9af7"

[battery]
full_symbol = "у°Ғ№ "
charging_symbol = "у°Ӯ„ "
discharging_symbol = "у°Ӯғ "
unknown_symbol = "у°ҒҪ "
empty_symbol = "у°ӮҺ "
format = "[$symbol$percentage]($style) "

[env_var.CHAMELEON]
default = ""
format = "with [у°ҡ© $value]($style) "
style = "bold #e0af68"

[custom.banger]
command = "echo ${BANGERS:-''}"
when = "true"
symbol = "уұҗӢ "
style = "bold #f7768e"
format = "[$symbol$output]($style) "
