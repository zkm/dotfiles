general {
	hide_cursor = true
	grace = 2
	ignore_empty_input = true
}

background {
	monitor =
	path = ~/.config/hypr/wallpapers/38580.jpg
	blur_passes = 3
	blur_size = 7
	noise = 0.0117
	contrast = 0.9
	brightness = 0.75
	vibrancy = 0.12
	vibrancy_darkness = 0.0
}

label {
	monitor =
	text = cmd[update:1000] date +"%H:%M"
	color = rgba(235, 239, 244, 1.0)
	font_size = 96
	font_family = FiraCode Nerd Font Mono
	position = 0, 140
	halign = center
	valign = center
}

label {
	monitor =
	text = cmd[update:1000] date +"%A, %B %d"
	color = rgba(216, 222, 233, 1.0)
	font_size = 24
	font_family = FiraCode Nerd Font Mono
	position = 0, 70
	halign = center
	valign = center
}

input-field {
	monitor =
	size = 320, 56
	outline_thickness = 2
	dots_size = 0.18
	dots_spacing = 0.22
	dots_center = true
	outer_color = rgba(236, 239, 244, 0.85)
	inner_color = rgba(46, 52, 64, 0.82)
	font_color = rgba(236, 239, 244, 1.0)
	fade_on_empty = false
	placeholder_text = Enter password
	hide_input = false
	check_color = rgba(163, 190, 140, 0.9)
	fail_color = rgba(191, 97, 106, 0.9)
	fail_text = Authentication failed
	capslock_color = rgba(235, 203, 139, 0.9)
	position = 0, -40
	halign = center
	valign = center
	rounding = 14
	shadow_passes = 2
	shadow_size = 6
}
