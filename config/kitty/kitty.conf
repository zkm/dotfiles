font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.5

disable_ligatures never
cursor_shape beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.45

scrollback_lines 10000
wheel_scroll_multiplier 5.0

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

remember_window_size yes
initial_window_width 140c
initial_window_height 40c
window_padding_width 10

background_opacity 0.96
confirm_os_window_close 0

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold
inactive_tab_font_style normal

map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_window
map ctrl+shift+] next_tab
map ctrl+shift+[ previous_tab
map ctrl+shift+d launch --location=vsplit
map ctrl+shift+f launch --location=hsplit

foreground            #d7e3ee
background            #0f141a
selection_foreground  #0f141a
selection_background  #5fb3ff

cursor                #5fb3ff
cursor_text_color     #0f141a

active_border_color   #5fb3ff
inactive_border_color #263240

active_tab_foreground   #0f141a
active_tab_background   #5fb3ff
inactive_tab_foreground #c4d3df
inactive_tab_background #1b232d

color0  #1b232d
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #5fb3ff
color5  #bb9af7
color6  #7dcfff
color7  #d7e3ee

color8  #3b4252
color9  #ff899d
color10 #a8d98a
color11 #f0c27a
color12 #86c5ff
color13 #c8aaf8
color14 #94e2ff
color15 #eef6ff
